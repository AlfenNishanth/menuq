version: "3.8"

services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: menuq
    ports:
      - 27017:27017

  node-server:
    build:
      context: .
    container_name: node-server
    restart: always
    ports:
      - 8080:8080
    depends_on:
      - mongodb
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # DATABASE_URL: mongodb://mongodb:27017/menuq
    command: ["npm", "run", "start"] 

volumes:
  mongo-data:

